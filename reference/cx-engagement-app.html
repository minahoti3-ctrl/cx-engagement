<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CX Transformation · 6-month reflection</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: #FBF6EF;
    color: #1a1a2e;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, textarea, select { font-family: inherit; }
  textarea { resize: vertical; }

  /* TOP NAV */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(251, 246, 239, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 0.5px solid rgba(15, 27, 92, 0.1);
  }
  .nav-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .nav-logo { font-weight: 500; font-size: 15px; color: #0F1B5C; white-space: nowrap; }
  .nav-pages { display: flex; gap: 4px; overflow-x: auto; flex: 1; justify-content: center; }
  .nav-pages button {
    font-size: 12px; padding: 6px 12px; border-radius: 999px;
    color: #444; white-space: nowrap; transition: all 0.15s;
  }
  .nav-pages button:hover { background: rgba(15, 27, 92, 0.06); }
  .nav-pages button.active { background: #0F1B5C; color: white; font-weight: 500; }
  .nav-right { display: flex; align-items: center; gap: 8px; }
  .user-select {
    font-size: 11px; padding: 4px 10px; border-radius: 999px;
    background: transparent; cursor: pointer; outline: none;
  }
  .reset-btn { font-size: 14px; color: #aaa; padding: 4px 8px; }
  .reset-btn:hover { color: #666; }

  /* LAYOUT */
  .page {
    max-width: 1100px; margin: 0 auto;
    padding: 40px 24px;
    position: relative;
  }
  .shapes-bg {
    position: absolute; inset: 0;
    overflow: hidden; pointer-events: none; z-index: 0;
  }
  .shape { position: absolute; }
  .shape.circle { border-radius: 50%; }
  .shape.square { border-radius: 10px; }
  .shape.triangle {
    width: 0; height: 0;
    border-left: 32px solid transparent;
    border-right: 32px solid transparent;
  }
  .content { position: relative; z-index: 1; }

  /* TYPOGRAPHY */
  h1 { font-size: 38px; font-weight: 500; line-height: 1.1; color: #0F1B5C; }
  h1.banner { font-size: 36px; color: white; }
  h2 { font-size: 26px; font-weight: 500; color: #0F1B5C; }
  h3 { font-size: 18px; font-weight: 500; color: #0F1B5C; }
  .eyebrow {
    font-size: 11px; font-weight: 500;
    letter-spacing: 1.5px; margin-bottom: 8px;
  }
  .subtle { color: #888; font-size: 13px; }

  /* BUTTONS */
  .pill-btn {
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    transition: transform 0.1s, opacity 0.15s;
  }
  .pill-btn:hover:not(:disabled) { transform: scale(1.04); }
  .pill-btn:active:not(:disabled) { transform: scale(0.97); }
  .pill-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pill-primary { background: #0F1B5C; color: white; }
  .pill-secondary {
    background: transparent;
    border: 1.5px solid #0F1B5C;
    color: #0F1B5C;
  }

  /* INPUTS */
  .input, .textarea {
    padding: 10px 16px;
    border-radius: 999px;
    border: 1px solid rgba(15, 27, 92, 0.15);
    background: white;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .textarea { border-radius: 16px; }
  .input:focus, .textarea:focus { border-color: #0F1B5C; }
  .input-small {
    padding: 6px 12px; font-size: 12px; border-radius: 999px;
    border: 1px solid rgba(0, 0, 0, 0.08); background: white; outline: none;
  }

  /* CARDS */
  .card {
    background: white;
    border-radius: 16px;
    border: 0.5px solid rgba(0, 0, 0, 0.08);
    padding: 20px 24px;
  }

  /* REACTION BAR */
  .reactions { display: flex; gap: 6px; margin-top: 8px; }
  .reaction-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(0, 0, 0, 0.05);
    font-size: 12px;
    transition: transform 0.1s, background 0.15s;
  }
  .reaction-btn:hover { background: white; transform: scale(1.08); }
  .reaction-btn.has-count { font-weight: 500; }
  .reaction-btn .count { font-size: 11px; font-weight: 500; }

  /* BADGE */
  .participant-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    border-radius: 50%;
    color: white;
    font-weight: 500;
    font-size: 11px;
    flex-shrink: 0;
  }
  .participant-badge.lg { width: 36px; height: 36px; font-size: 13px; }

  /* TILES */
  .tile {
    border-radius: 16px;
    padding: 20px;
    text-align: left;
    transition: transform 0.2s;
    cursor: pointer;
  }
  .tile:hover { transform: translateY(-4px); }
  .stat-tile { padding: 20px; text-align: left; }
  .stat-tile:hover { transform: translateY(-6px) scale(1.02); }
  .stat-num {
    font-size: 48px; font-weight: 500; line-height: 1;
    margin-bottom: 4px;
  }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15, 27, 92, 0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
    animation: fadeIn 0.2s;
  }
  .modal {
    background: white;
    border-radius: 24px;
    max-width: 640px; width: 100%;
    max-height: 85vh; overflow: auto;
    padding: 32px;
    animation: scaleIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* GRIDS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 720px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  /* SLIDER */
  input[type="range"] {
    width: 100%; height: 6px; border-radius: 3px;
    background: rgba(0, 0, 0, 0.1); outline: none;
    -webkit-appearance: none; appearance: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    background: var(--thumb-color, #888);
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    background: var(--thumb-color, #888);
  }
  input[type="range"]:disabled::-webkit-slider-thumb {
    background: #ccc;
    cursor: not-allowed;
  }
  input[type="range"]:disabled::-moz-range-thumb {
    background: #ccc;
    cursor: not-allowed;
  }

  /* RETRO BOARD */
  .retro-cell {
    border-radius: 12px;
    padding: 12px;
    min-height: 140px;
    background: #FAFAF7;
    border: 0.5px solid rgba(0, 0, 0, 0.05);
  }
  .retro-card {
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 6px;
    font-size: 12px;
  }

  /* DRAG-AND-DROP */
  .drag-item {
    background: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: grab;
    border: 0.5px solid rgba(0, 0, 0, 0.08);
    margin-bottom: 6px;
    transition: transform 0.1s, box-shadow 0.15s;
  }
  .drag-item:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
  .drag-item:active { cursor: grabbing; }
  .drag-item.tray { display: inline-flex; border-radius: 999px; margin: 4px; }
  .drag-item-row { display: flex; align-items: center; gap: 8px; }
  .drag-item-text { flex: 1; }
  .drag-item-delete {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: transparent;
    color: #bbb;
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .drag-item:hover .drag-item-delete { opacity: 1; }
  .drag-item-delete:hover { background: rgba(163, 45, 45, 0.1); color: #A32D2D; }
  .drag-zone {
    border-radius: 16px;
    padding: 14px;
    min-height: 200px;
    transition: background 0.2s;
  }
  .drag-zone.drag-over { background: rgba(15, 27, 92, 0.05) !important; }
  .drop-here-msg {
    text-align: center;
    color: #aaa;
    font-size: 11px;
    font-style: italic;
    padding: 30px 10px;
  }

  /* TRAFFIC LIGHTS */
  .light {
    width: 28px; height: 28px;
    border-radius: 50%;
    transition: transform 0.15s, opacity 0.15s;
  }
  .light:hover { transform: scale(1.1); }

  /* TIMELINE */
  .timeline {
    position: relative;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
  }
  .timeline::before {
    content: '';
    position: absolute;
    top: 11px; left: 8%; right: 8%;
    height: 2px;
    background: rgba(0, 0, 0, 0.08);
  }
  .timeline-step {
    display: flex; flex-direction: column; align-items: center;
    position: relative; z-index: 1;
  }
  .timeline-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    margin-bottom: 8px;
    background: white;
    border: 2px solid #ccc;
  }
  .timeline-dot.filled {
    border: none;
  }

  /* NOSCROLL */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

  .footer-nav {
    max-width: 1100px; margin: 0 auto;
    padding: 32px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .helper-text { font-size: 12px; color: #888; }
  .italic { font-style: italic; }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  .empty-state {
    font-size: 13px; color: #aaa; font-style: italic;
    padding: 12px;
  }

  .signal-row {
    background: white;
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    margin-bottom: 8px;
  }

  /* HERO HIGHLIGHT */
  .highlight { padding: 0 8px; border-radius: 6px; }

  /* JOIN CHIP */
  .join-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    margin: 4px;
  }
  .join-chip-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* BANNER */
  .banner {
    text-align: center;
    padding: 36px 20px;
    border-radius: 24px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <div class="nav-logo">CX · 6 months in 👋</div>
    <div class="nav-pages" id="navPages"></div>
    <div class="nav-right">
      <select id="userSelect" class="user-select" style="display:none"></select>
      <button class="reset-btn" id="resetBtn" title="Reset session">↻</button>
    </div>
  </div>
</div>

<div id="root"></div>

<div class="footer-nav">
  <button class="pill-btn pill-secondary" id="prevBtn">← Back</button>
  <div class="helper-text" id="pageIndicator">1 of 8</div>
  <button class="pill-btn pill-primary" id="nextBtn">Next →</button>
</div>

<div id="modalRoot"></div>

<script>
const COLORS = [
  { name: 'magenta',  hex: '#8E2D6F', tint: '#F4E4ED', dark: '#5e1d49' },
  { name: 'navy',     hex: '#0F1B5C', tint: '#DDE0F0', dark: '#08113b' },
  { name: 'cobalt',   hex: '#3D6BD3', tint: '#DCE4F7', dark: '#284791' },
  { name: 'amber',    hex: '#C97A0E', tint: '#FDF1DE', dark: '#8a5208' },
  { name: 'lavender', hex: '#7B5BA8', tint: '#E8DBEC', dark: '#4a3670' },
];

const state = {
  page: 0,
  participants: [],
  currentUserId: null,
  proudMoments: [],
  successDefs: [],
  health: { draft: {}, submitted: {} },
  directionPin: null,
  retroCards: { cxCont: [], cxStop: [], cxChange: [], vmoCont: [], vmoStop: [], vmoChange: [] },
  commitments: [],
  bauCriteria: {
    must: ['Clear owner in receiving team', 'Metrics & reporting in place'],
    nice: ['Peer benchmarks documented'],
    risk: ['Funding model post-handover'],
    tray: ['Capability built in receiving team', 'Governance & CXT touchpoints defined', 'Risks & dependencies documented', 'Run-rate budget agreed', '90-day exit support plan']
  },
  orgPins: [],
  bauNotes: [],
  orgNotes: [],
  bolderNotes: [],
  bolderTriggers: [],
  readiness: {},
  finalReflections: [],
};

const PAGES = [
  { num: 0, label: 'Welcome' },
  { num: 1, label: 'Celebrate' },
  { num: 2, label: 'Health check' },
  { num: 3, label: 'Commitments' },
  { num: 4, label: 'BAU' },
  { num: 5, label: 'Org evolution' },
  { num: 6, label: 'Bold to bolder' },
  { num: 7, label: 'Close' },
];

function currentUser() {
  return state.participants.find(p => p.id === state.currentUserId) || null;
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function render() {
  renderNav();
  renderPage();
  renderFooter();
}

function renderNav() {
  const navPages = document.getElementById('navPages');
  navPages.innerHTML = '';
  PAGES.forEach(p => {
    const btn = document.createElement('button');
    btn.textContent = `${p.num}. ${p.label}`;
    if (p.num === state.page) btn.classList.add('active');
    btn.onclick = () => { state.page = p.num; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
    navPages.appendChild(btn);
  });

  const userSelect = document.getElementById('userSelect');
  const cu = currentUser();
  if (cu && state.participants.length > 0) {
    userSelect.style.display = 'block';
    userSelect.style.borderColor = cu.color.hex;
    userSelect.style.color = cu.color.hex;
    userSelect.style.border = `1px solid ${cu.color.hex}`;
    userSelect.innerHTML = state.participants.map(p =>
      `<option value="${p.id}" ${p.id === state.currentUserId ? 'selected' : ''}>${escapeHtml(p.name)}</option>`
    ).join('');
    userSelect.onchange = (e) => {
      state.currentUserId = Number(e.target.value);
      render();
    };
  } else {
    userSelect.style.display = 'none';
  }
}

function renderFooter() {
  document.getElementById('pageIndicator').textContent = `${state.page + 1} of 8`;
  document.getElementById('prevBtn').disabled = state.page === 0;
  document.getElementById('nextBtn').disabled = state.page === 7;
}

document.getElementById('prevBtn').onclick = () => {
  state.page = Math.max(0, state.page - 1);
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};
document.getElementById('nextBtn').onclick = () => {
  state.page = Math.min(7, state.page + 1);
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};
document.getElementById('resetBtn').onclick = () => {
  if (state.participants.length === 0) return;
  state.page = 0;
  state.participants = [];
  state.currentUserId = null;
  state.proudMoments = [];
  state.successDefs = [];
  state.health = { draft: {}, submitted: {} };
  state.directionPin = null;
  state.retroCards = { cxCont: [], cxStop: [], cxChange: [], vmoCont: [], vmoStop: [], vmoChange: [] };
  state.commitments = [];
  state.bauCriteria = {
    must: ['Clear owner in receiving team', 'Metrics & reporting in place'],
    nice: ['Peer benchmarks documented'],
    risk: ['Funding model post-handover'],
    tray: ['Capability built in receiving team', 'Governance & CXT touchpoints defined', 'Risks & dependencies documented', 'Run-rate budget agreed', '90-day exit support plan']
  };
  state.orgPins = [];
  state.bauNotes = [];
  state.orgNotes = [];
  state.bolderNotes = [];
  state.bolderTriggers = [];
  state.readiness = {};
  state.finalReflections = [];
  render();
};

function shapesBg(density) {
  const sparse = [
    { type: 'circle', size: 60, top: '10%', left: '85%', color: COLORS[3].hex, opacity: 0.4 },
    { type: 'square', size: 40, top: '70%', left: '5%', color: COLORS[0].hex, opacity: 0.5, rotate: 20 },
    { type: 'circle', size: 30, top: '45%', left: '92%', color: COLORS[4].hex, opacity: 0.5 },
  ];
  const full = [
    { type: 'circle', size: 110, top: '5%', left: '82%', color: COLORS[3].hex, opacity: 0.9 },
    { type: 'circle', size: 50, top: '18%', left: '70%', color: COLORS[0].hex, opacity: 0.85 },
    { type: 'square', size: 70, top: '60%', left: '88%', color: COLORS[2].hex, opacity: 0.85, rotate: 15 },
    { type: 'triangle', top: '55%', left: '74%', color: COLORS[4].hex, opacity: 0.85 },
    { type: 'circle', size: 32, top: '40%', left: '90%', color: COLORS[1].hex, opacity: 0.85 },
    { type: 'circle', size: 18, top: '12%', left: '60%', color: COLORS[3].hex, opacity: 0.7 },
  ];
  const shapes = density === 'sparse' ? sparse : full;
  return `<div class="shapes-bg">${shapes.map(s => {
    if (s.type === 'circle') return `<div class="shape circle" style="width:${s.size}px;height:${s.size}px;top:${s.top};left:${s.left};background:${s.color};opacity:${s.opacity}"></div>`;
    if (s.type === 'square') return `<div class="shape square" style="width:${s.size}px;height:${s.size}px;top:${s.top};left:${s.left};background:${s.color};opacity:${s.opacity};transform:rotate(${s.rotate}deg)"></div>`;
    return `<div class="shape triangle" style="top:${s.top};left:${s.left};border-bottom:56px solid ${s.color};opacity:${s.opacity}"></div>`;
  }).join('')}</div>`;
}

function badge(p, size) {
  if (!p) return '';
  return `<div class="participant-badge ${size === 'lg' ? 'lg' : ''}" style="background:${p.color.hex}">${escapeHtml(p.name.slice(0,2).toUpperCase())}</div>`;
}

function reactionBar(reactions, fnName, id) {
  const reacts = reactions || { heart: [], like: [], q: [] };
  const cu = currentUser();
  const cuId = cu ? cu.id : null;
  const hasReacted = (k) => cuId != null && Array.isArray(reacts[k]) && reacts[k].some(x => String(x) === String(cuId));
  const count = (k) => Array.isArray(reacts[k]) ? reacts[k].length : 0;
  const call = (k) => `window.${fnName}(${JSON.stringify(id)},'${k}')`;
  const btn = (k, emoji, title) => {
    const reacted = hasReacted(k);
    const c = count(k);
    return `<button class="reaction-btn${reacted ? ' reacted' : ''}" onclick="${call(k)}" title="${title}"${reacted ? ' style="background:rgba(15,27,92,0.08);border-color:rgba(15,27,92,0.2)"' : ''}>${emoji}${c > 0 ? `<span class="count">${c}</span>` : ''}</button>`;
  };
  return `<div class="reactions">
    ${btn('heart', '❤️', '100% agree')}
    ${btn('like', '👍', 'like')}
    ${btn('q', '❓', 'discuss')}
  </div>`;
}

function triggerRagBar(trigger) {
  const cu = currentUser();
  const cuId = cu ? cu.id : null;
  const ratings = trigger.ratings || {};
  const colorMap = { green: '#3B6D11', amber: '#C97A0E', red: '#A32D2D' };
  const bgMap    = { green: '#EAF3DE', amber: '#FDF1DE', red: '#FCEBEB' };

  const dotsFor = (rag) => Object.entries(ratings).filter(([_, v]) => v === rag);
  const cuRating = cuId != null ? ratings[cuId] : null;

  const lightBtn = (rag) => {
    const active = cuRating === rag;
    return `<button class="light" onclick="window.rateTrigger(${JSON.stringify(trigger.id)},'${rag}')" style="width:22px;height:22px;background:${active ? colorMap[rag] : bgMap[rag]};${active ? `border:2px solid ${colorMap[rag]}` : 'border:none'};opacity:${!cuRating || active ? 1 : 0.4}" title="${rag === 'green' ? 'strong signal' : rag === 'amber' ? 'partial signal' : 'not yet'}"></button>`;
  };

  const dotRow = (rag) => {
    const list = dotsFor(rag);
    if (list.length === 0) return '';
    return `<div style="display:flex;gap:3px;align-items:center">
      <div style="width:6px;height:6px;border-radius:50%;background:${colorMap[rag]}"></div>
      ${list.map(([pid]) => {
        const p = state.participants.find(x => String(x.id) === String(pid));
        if (!p) return '';
        return `<div title="${escapeHtml(p.name)}" style="width:11px;height:11px;border-radius:50%;background:${p.color.hex};border:1.5px solid white;box-shadow:0 1px 2px rgba(0,0,0,0.15)"></div>`;
      }).join('')}
    </div>`;
  };

  return `<div style="display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap">
    <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11px">

  if (idx >= 0) reactions[k].splice(idx, 1);

}

function attachHealthRetro() {
  const cu = currentUser();

  document.querySelectorAll('[data-health]').forEach(el => {
    el.oninput = (e) => {
      if (!cu) return;
      if (state.health.submitted[cu.id]) return; // locked after submit
      const key = el.dataset.health;
      const val = Number(e.target.value);
      if (!state.health.draft[cu.id]) {
        state.health.draft[cu.id] = { engagement: 50, energy: 50, prioritisation: 50, ways: 50 };
      }
      state.health.draft[cu.id][key] = val;
      // Live-update the big number for this dial without a full re-render
      const card = el.closest('div[style*="border-radius:10px"]');
      if (card) {
        const numEl = card.querySelector('div[style*="font-size:28px"]');
        // Only update the user's draft number when no team has submitted yet
        if (numEl && Object.keys(state.health.submitted).length === 0) {
          numEl.textContent = val;
        }
      }
    };
  });

  const submitBtn = document.getElementById('submitHealth');
  if (submitBtn && cu) {
    submitBtn.onclick = () => {
      const draft = state.health.draft[cu.id] || { engagement: 50, energy: 50, prioritisation: 50, ways: 50 };
      state.health.submitted[cu.id] = { ...draft };
      render();
    };
  }

  const unsubmitBtn = document.getElementById('unsubmitHealth');
  if (unsubmitBtn && cu) {
    unsubmitBtn.onclick = () => {
      delete state.health.submitted[cu.id];
      render();
    };
  }

  const scatter = document.getElementById('scatter');
  if (scatter && cu) {
    scatter.onclick = (e) => {
      const rect = scatter.getBoundingClientRect();
      const x = Math.round(((e.clientX - rect.left) / rect.width) * 100);
      const y = Math.round(((e.clientY - rect.top) / rect.height) * 100);
      const p = state.participants.find(x => x.id === cu.id);
      if (p) {
        p.pin = { x: Math.max(0, Math.min(100, x)), y: Math.max(0, Math.min(100, y)) };
        render();
      }
    };
  }

  document.querySelectorAll('[data-retro]').forEach(el => {
    el.onkeydown = (e) => {
      if (e.key === 'Enter' && cu) {
        const text = e.target.value.trim();
        if (!text) return;
        const ck = el.dataset.retro;
        state.retroCards[ck].push({ id: Date.now() + Math.random(), text, color: cu.color, reactions: { heart: [], like: [], q: [] } });
        e.target.value = '';
        render();
      }
    };
  });

  window.reactRetro = (ck, id, k) => {
    const c = state.retroCards[ck].find(x => String(x.id) === String(id));
    if (c) { toggleReaction(c.reactions, k); render(); }
  };
}

function attachBAU() {
  attachNotesSection('bauNotes', 'submitBauNote');

  let draggedItem = null;
  let draggedFrom = null;

  document.querySelectorAll('.drag-item').forEach(el => {
    el.addEventListener('dragstart', (e) => {
      draggedItem = el.dataset.item;
      draggedFrom = el.dataset.from;
      e.dataTransfer.effectAllowed = 'move';
    });
    el.onclick = (e) => {
      if (e.target.classList.contains('drag-item-delete')) return;
      if (el.dataset.from !== 'tray') {
        const from = el.dataset.from;
        const item = el.dataset.item;
        state.bauCriteria[from] = state.bauCriteria[from].filter(x => x !== item);
        if (!state.bauCriteria.tray.includes(item)) state.bauCriteria.tray.push(item);
        render();
      }
    };
  });

  document.querySelectorAll('.drag-item-delete').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const item = btn.dataset.deleteItem;
      const from = btn.dataset.deleteFrom;
      state.bauCriteria[from] = state.bauCriteria[from].filter(x => x !== item);
      render();
    };
  });

  const addBtn = document.getElementById('bauAddCriterionBtn');
  const addInput = document.getElementById('bauNewCriterion');
  if (addBtn && addInput) {
    const add = () => {
      const text = addInput.value.trim();
      if (!text) return;
      const allItems = [
        ...state.bauCriteria.must,
        ...state.bauCriteria.nice,
        ...state.bauCriteria.risk,
        ...state.bauCriteria.tray,
      ];
      if (allItems.includes(text)) {
        addInput.value = '';
        return;
      }
      state.bauCriteria.tray.push(text);
      addInput.value = '';
      render();
    };
    addBtn.onclick = add;
    addInput.onkeydown = (e) => { if (e.key === 'Enter') add(); };
  }

  document.querySelectorAll('.drag-zone').forEach(zone => {
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', () => {
      zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (!draggedItem) return;
      const to = zone.dataset.col;
      if (to === draggedFrom) return;
      state.bauCriteria[draggedFrom] = state.bauCriteria[draggedFrom].filter(x => x !== draggedItem);
      if (!state.bauCriteria[to].includes(draggedItem)) state.bauCriteria[to].push(draggedItem);
      draggedItem = null;
      draggedFrom = null;
      render();
    });
  });

  document.querySelectorAll('.drag-item').forEach(el => {
    el.style.cursor = el.dataset.from === 'tray' ? 'grab' : 'pointer';
    el.title = el.dataset.from === 'tray' ? 'Drag to a column' : 'Click to send back to tray, or drag';
  });
}

            <div style="border-radius:12px;padding:16px;background:${COLORS[2].tint}">
              <div style="font-size:11px;font-weight:500;margin-bottom:12px;letter-spacing:1px;color:${COLORS[2].dark}">DECISIONS</div>
              ${decisions.map(d => `<div style="font-size:13px;display:flex;gap:8px;margin-bottom:8px;color:${COLORS[2].dark}"><span>✓</span>${d}</div>`).join('')}
            </div>
            <div style="border-radius:12px;padding:16px;background:${COLORS[3].tint}">
              <div style="font-size:11px;font-weight:500;margin-bottom:12px;letter-spacing:1px;color:${COLORS[3].dark}">NEXT STEPS</div>
              ${nextSteps.map(d => `<div style="font-size:13px;display:flex;gap:8px;margin-bottom:8px;color:${COLORS[3].dark}"><span>→</span>${d}</div>`).join('')}
            </div>
          </div>
        </div>

        ${eyebrow(COLORS[0].hex, 'FINAL REFLECTIONS')}
        <h3 style="margin-bottom:12px">One thing you're taking away</h3>
        ${cu ? `
          <div style="display:flex;gap:8px;margin-bottom:20px">
            <input type="text" id="refInput" class="input" placeholder="Your takeaway..." style="flex:1" />
            <button class="pill-btn pill-primary" id="refBtn">Share</button>
          </div>
        ` : ''}
        <div class="grid-2" style="margin-bottom:32px">
          ${state.finalReflections.map(r => `
            <div style="border-radius:16px;padding:12px;display:flex;gap:8px;background:${r.color.tint}">
              ${badge({ name: r.name, color: r.color })}
              <div style="flex:1">
                <div style="font-size:11px;font-weight:500;margin-bottom:2px;color:${r.color.dark}">${escapeHtml(r.name)}</div>
                <div style="font-size:13px;color:${r.color.dark}">${escapeHtml(r.text)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function attachClose() {
  const cu = currentUser();
  const refBtn = document.getElementById('refBtn');
  const refInput = document.getElementById('refInput');
  if (refBtn && cu) {
    const add = () => {
      const text = refInput.value.trim();
      if (!text) return;
      state.finalReflections.push({ id: Date.now() + Math.random(), text, name: cu.name, color: cu.color });
      refInput.value = '';
      render();
    };
    refBtn.onclick = add;
    refInput.onkeydown = (e) => { if (e.key === 'Enter') add(); };
  }
}

render();
</script>
</body>
</html>
